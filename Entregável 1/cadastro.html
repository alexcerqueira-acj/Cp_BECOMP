<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>RECANTO GAMER</h1>
        <nav>
            <a href="index.html">Ir Para o Início</a>
            <br>
            <a href="galeria.html">Galeria de Jogos</a>
        </nav>
    </header>
    <main>

        <br>
        <h2>Cadastro de Usuário</h2>
        <h3>Dados Pessoais:</h3>
        <form>
            <!-- Legenda Nome-->
            <label for="campo_nome">Nome:</label>
            <input id="campo_nome" type="text" placeholder="Nome do Usuário" required>
            <br><br>

            <!-- Legenda Sobrenome-->
            <label for="campo_sobrenome">Sobrenome:</label>
            <input id="campo_sobrenome" type="text" placeholder="Sobrenome do Usuário" required>
            <br><br>
            
            <!-- Legenda Email -->
            <label for="campo_email">Email:</label>
            <input id="campo_email" type="email" placeholder="Email do Usuário" required>
            <br><br>

            <!-- Legenda Senha-->
            <label for="campo_senha">Senha:</label>
            <input id="campo_senha" type="password" placeholder="Senha do Usuário" required>
            <br><br>

            <!-- Consoles de Interesse-->
            <h3>Consoles de Interesse:</h3>
            
            <input type="checkbox" id="check_ps5" name="console" value="playstation">
            <label for="check_ps5">Playstation 5</label>
            <br>
            <input type="checkbox" id="check_ns" name="console" value="nintendo">
            <label for="check_ns">Nintendo Switch</label>
            <br>
            <input type="checkbox" id="check_xbox" name="console" value="xbox">
            <label for="check_xbox">Xbox X|S</label>
            <br><br>

            <!-- Atualizações -->
            <h3>Deseja Receber Atualizações Pelo Email?</h3>
            
            <input type="radio" id="radio_sim" name="option" value="sim">
            <label for="radio_sim">Sim</label>
            <br>
            <input type="radio" id="radio_nao" name="option" value="nao">
            <label for="radio_nao">Não</label>
            <br><br>
            <input type="submit" value="Enviar Resposta">


        </form>

    </main>
</body>
</html>
