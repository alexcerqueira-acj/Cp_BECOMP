<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PokéCards - Loja de Cartas Pokémon</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="header" id="inicio">
    <div class="header-conteudo">
      <h1 class="logo">PokéCards</h1>

      <nav class="nav">
        <ul class="nav-lista">
          <li><a href="#inicio">Início</a></li>
          <li><a href="#produtos">Produtos</a></li>
          <li><a href="#contato">Contato</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- ===== SLIDER DE FOTOS ===== -->
  <section class="slider-container" id="sliderContainer">
    <button class="slider-btn slider-btn-prev" id="sliderPrev" aria-label="Slide anterior">&#10094;</button>

    <div class="slider-track" id="sliderTrack">
    </div>

    <button class="slider-btn slider-btn-next" id="sliderNext" aria-label="Próximo slide">&#10095;</button>

    <div class="slider-dots" id="sliderDots">
    </div>
  </section>

  <!-- ===== BARRA DE BUSCA ===== -->
  <section class="busca-container">
    <input
      type="text"
      id="buscaInput"
      class="busca-input"
      placeholder="Buscar carta por nome ou tipo (ex: fogo, água...)"
    >
    <button id="botaoBuscar" class="busca-botao">Buscar</button>
  </section>

  <!-- ===== GRADE DE PRODUTOS ===== -->
  <main>
    <section id="produtos" class="produtos-container">
      <div id="produtosGrid" class="produtos-grid">
      </div>
    </section>
  </main>

  <!-- ===== CONTATO ===== -->
  <section id="contato" class="contato-container">
    <h2>Contato</h2>
    <p>Dúvidas ou pedidos especiais? Fale com a gente: <a href="mailto:contato@pokecards.com">contato@pokecards.com</a></p>
  </section>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <p>&copy; 2026 PokéCards. Todos os direitos reservados.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
